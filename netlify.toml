[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/about"
  to = "/about/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/about/"
  to = "/about/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/projects"
  to = "/projects/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/projects/"
  to = "/projects/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/articles"
  to = "/articles/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/articles/"
  to = "/articles/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/contact"
  to = "/contact/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact/index.html"
  status = 200
  force = true

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
